<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" role="img" aria-label="How It Works — store, search, link, route; with automatic memory-diffusion subsystem and lifecycle state transitions">
  <defs>
    <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1027"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="htitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="33%" stop-color="#8b5cf6"/>
      <stop offset="66%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>

    <linearGradient id="s1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#0ea5e9"/></linearGradient>
    <linearGradient id="s2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="s3" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="s4" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#d946ef"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
    <linearGradient id="diffuse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>

    <filter id="hshadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="hglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="harrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a78bfa"/>
    </marker>

    <pattern id="hdots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#6366f1" fill-opacity="0.08"/>
    </pattern>

    <!-- ripple radial for diffuse band -->
    <radialGradient id="ripple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="470" rx="14" fill="url(#hbg)"/>
  <rect width="900" height="470" rx="14" fill="url(#hdots)"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="url(#htitle)" letter-spacing="-0.3">How It Works</text>
  <text x="450" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">The core memory loop — store, search, link, route — with an ambient diffusion subsystem that runs underneath</text>

  <!-- Horizontal flow rail -->
  <rect x="80" y="215" width="740" height="3" rx="1.5" fill="url(#flow)" opacity="0.55"/>

  <!-- Step 1: STORE -->
  <g transform="translate(60, 100)" filter="url(#hshadow)">
    <rect width="175" height="220" rx="14" fill="#0f172a" stroke="#1e293b"/>
    <rect width="175" height="4" rx="2" fill="url(#s1)"/>
    <circle cx="87" cy="58" r="30" fill="#22d3ee" fill-opacity="0.14"/>
    <g transform="translate(70,42)" stroke="url(#s1)" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#hglow)">
      <rect x="2" y="2" width="30" height="30" rx="4"/>
      <line x1="10" y1="12" x2="24" y2="12"/>
      <line x1="10" y1="18" x2="24" y2="18"/>
      <line x1="10" y1="24" x2="18" y2="24"/>
    </g>
    <text x="87" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">Store</text>
    <text x="87" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Embed text as vectors</text>
    <text x="87" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Auto-detect duplicates</text>
    <text x="87" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Enrich keywords</text>
    <rect x="30" y="190" width="115" height="20" rx="5" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-opacity="0.35"/>
    <text x="87" y="204" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#67e8f9">remember · store_memory</text>
  </g>

  <line x1="242" y1="210" x2="282" y2="210" stroke="#a78bfa" stroke-width="2" marker-end="url(#harrow)"/>

  <!-- Step 2: SEARCH -->
  <g transform="translate(290, 100)" filter="url(#hshadow)">
    <rect width="175" height="220" rx="14" fill="#0f172a" stroke="#1e293b"/>
    <rect width="175" height="4" rx="2" fill="url(#s2)"/>
    <circle cx="87" cy="58" r="30" fill="#8b5cf6" fill-opacity="0.14"/>
    <g transform="translate(72,42)" stroke="url(#s2)" stroke-width="2.4" fill="none" stroke-linecap="round" filter="url(#hglow)">
      <circle cx="14" cy="14" r="11"/>
      <line x1="22" y1="22" x2="30" y2="30" stroke-width="2.8"/>
    </g>
    <text x="87" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">Search</text>
    <text x="87" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c4b5fd">Hybrid BM25 + vector</text>
    <text x="87" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Spectral re-rank (auto)</text>
    <text x="87" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Cross-namespace RRF</text>
    <rect x="30" y="190" width="115" height="20" rx="5" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.35"/>
    <text x="87" y="204" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#c4b5fd">recall · search_memory</text>
  </g>

  <line x1="472" y1="210" x2="512" y2="210" stroke="#a78bfa" stroke-width="2" marker-end="url(#harrow)"/>

  <!-- Step 3: LINK -->
  <g transform="translate(520, 100)" filter="url(#hshadow)">
    <rect width="175" height="220" rx="14" fill="#0f172a" stroke="#1e293b"/>
    <rect width="175" height="4" rx="2" fill="url(#s3)"/>
    <circle cx="87" cy="58" r="30" fill="#a855f7" fill-opacity="0.14"/>
    <g transform="translate(68,40)" stroke="url(#s3)" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#hglow)">
      <circle cx="9" cy="9" r="5" fill="#a855f7" fill-opacity="0.35"/>
      <circle cx="29" cy="9" r="5" fill="#d946ef" fill-opacity="0.35"/>
      <circle cx="19" cy="28" r="5" fill="#c4b5fd" fill-opacity="0.35"/>
      <line x1="13" y1="11" x2="25" y2="11"/>
      <line x1="11" y1="13" x2="16" y2="23"/>
      <line x1="27" y1="13" x2="22" y2="23"/>
    </g>
    <text x="87" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">Link</text>
    <text x="87" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#f0abfc">Knowledge graph edges</text>
    <text x="87" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Auto-link densification</text>
    <text x="87" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Multi-hop traversal</text>
    <rect x="30" y="190" width="115" height="20" rx="5" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.35"/>
    <text x="87" y="204" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#e9d5ff">link_memories · auto-link</text>
  </g>

  <line x1="702" y1="210" x2="742" y2="210" stroke="#a78bfa" stroke-width="2" marker-end="url(#harrow)"/>

  <!-- Step 4: ROUTE -->
  <g transform="translate(750, 100)" filter="url(#hshadow)">
    <rect width="175" height="220" rx="14" fill="#0f172a" stroke="#1e293b"/>
    <rect width="175" height="4" rx="2" fill="url(#s4)"/>
    <circle cx="87" cy="58" r="30" fill="#d946ef" fill-opacity="0.14"/>
    <g transform="translate(70,38)" stroke="url(#s4)" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#hglow)">
      <circle cx="17" cy="6" r="4" fill="#d946ef" fill-opacity="0.35"/>
      <circle cx="6" cy="24" r="4" fill="#f472b6" fill-opacity="0.35"/>
      <circle cx="28" cy="24" r="4" fill="#a855f7" fill-opacity="0.35"/>
      <line x1="15" y1="10" x2="8" y2="20"/>
      <line x1="19" y1="10" x2="26" y2="20"/>
      <line x1="10" y1="24" x2="24" y2="24"/>
    </g>
    <text x="87" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">Route</text>
    <text x="87" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#f0abfc">Expert dispatch (HMoE)</text>
    <text x="87" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Domain-tree routing</text>
    <text x="87" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Zero LLM API calls</text>
    <rect x="30" y="190" width="115" height="20" rx="5" fill="#d946ef" fill-opacity="0.15" stroke="#d946ef" stroke-opacity="0.35"/>
    <text x="87" y="204" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#f0abfc">dispatch_task</text>
  </g>

  <!-- Diffuse band — automatic background subsystem -->
  <g transform="translate(60, 340)">
    <rect width="780" height="50" rx="12" fill="#0f172a" stroke="#1e293b"/>
    <rect width="780" height="50" rx="12" fill="url(#ripple)"/>
    <rect width="780" height="3" rx="1.5" fill="url(#diffuse)"/>

    <!-- Brain/wave icon on the left -->
    <g transform="translate(18, 15)" stroke="url(#diffuse)" stroke-width="1.6" fill="none" stroke-linecap="round" filter="url(#hglow)">
      <path d="M2 11 Q 6 4 12 11 T 22 11 T 32 11"/>
    </g>

    <text x="56" y="22" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" letter-spacing="0.6">DIFFUSE</text>
    <text x="56" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">graph-Laplacian eigenbasis · runs automatically · no LLM invocation</text>

    <!-- Background service chips -->
    <g transform="translate(330, 14)">
      <rect width="130" height="22" rx="11" fill="#5eead4" fill-opacity="0.10" stroke="#5eead4" stroke-opacity="0.45"/>
      <text x="65" y="15" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#5eead4">decay diffusion · 15m</text>
    </g>
    <g transform="translate(470, 14)">
      <rect width="130" height="22" rx="11" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.45"/>
      <text x="65" y="15" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#c4b5fd">auto-link scan · 6h</text>
    </g>
    <g transform="translate(610, 14)">
      <rect width="155" height="22" rx="11" fill="#f0abfc" fill-opacity="0.12" stroke="#f0abfc" stroke-opacity="0.45"/>
      <text x="77" y="15" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#f5d0fe">sleep consolidation · 24h</text>
    </g>
  </g>

  <!-- Lifecycle bar -->
  <g transform="translate(60, 405)">
    <rect width="780" height="50" rx="12" fill="#0f172a" stroke="#1e293b"/>
    <text x="22" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1.2">LIFECYCLE</text>
    <text x="22" y="36" font-family="system-ui, sans-serif" font-size="10" fill="#475569">activation energy · graph-aware decay</text>

    <!-- STM -->
    <g transform="translate(150, 13)">
      <rect width="78" height="24" rx="12" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-opacity="0.55"/>
      <text x="39" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6ee7b7">STM</text>
    </g>
    <path d="M232 25 L264 25" stroke="#475569" stroke-width="1.5" marker-end="url(#harrow)"/>

    <!-- LTM -->
    <g transform="translate(270, 13)">
      <rect width="78" height="24" rx="12" fill="#3b82f6" fill-opacity="0.18" stroke="#3b82f6" stroke-opacity="0.55"/>
      <text x="39" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#93c5fd">LTM</text>
    </g>
    <path d="M352 25 L384 25" stroke="#475569" stroke-width="1.5" marker-end="url(#harrow)"/>

    <!-- Archived -->
    <g transform="translate(390, 13)">
      <rect width="92" height="24" rx="12" fill="#f59e0b" fill-opacity="0.18" stroke="#f59e0b" stroke-opacity="0.55"/>
      <text x="46" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fcd34d">Archived</text>
    </g>

    <!-- Resurrect arrow back (curved) -->
    <path d="M482 23 C 540 -8 380 -8 200 13" fill="none" stroke="#d946ef" stroke-opacity="0.55" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#harrow)"/>
    <text x="510" y="11" font-family="system-ui, sans-serif" font-size="9.5" fill="#f0abfc">deep_recall · auto-resurrect</text>

    <!-- Feedback loop chip -->
    <g transform="translate(610, 13)">
      <rect width="155" height="24" rx="12" fill="#8b5cf6" fill-opacity="0.14" stroke="#8b5cf6" stroke-opacity="0.45"/>
      <text x="77" y="17" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#c4b5fd">memory_feedback · decay</text>
    </g>
  </g>
</svg>
