<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="220"/><line x1="200" y1="0" x2="200" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/><line x1="400" y1="0" x2="400" y2="220"/>
    <line x1="500" y1="0" x2="500" y2="220"/><line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="700" y1="0" x2="700" y2="220"/><line x1="800" y1="0" x2="800" y2="220"/>
  </g>

  <!-- Glow behind icon -->
  <circle cx="110" cy="110" r="80" fill="url(#glow)"/>

  <!-- Brain/memory icon -->
  <g transform="translate(70, 65)" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer brain shape -->
    <path d="M40 5 C25 5 10 15 10 30 C10 38 14 44 20 48 C16 52 14 58 14 64 C14 78 25 85 40 85 C55 85 66 78 66 64 C66 58 64 52 60 48 C66 44 70 38 70 30 C70 15 55 5 40 5Z" stroke="url(#accent)" fill="none"/>
    <!-- Neural connection lines -->
    <line x1="30" y1="30" x2="50" y2="45" stroke="#6366f1" opacity="0.7"/>
    <line x1="50" y1="30" x2="30" y2="50" stroke="#8b5cf6" opacity="0.7"/>
    <line x1="40" y1="25" x2="40" y2="60" stroke="#7c3aed" opacity="0.5"/>
    <line x1="25" y1="42" x2="55" y2="42" stroke="#7c3aed" opacity="0.5"/>
    <!-- Neural nodes -->
    <circle cx="30" cy="30" r="4" fill="#6366f1"/>
    <circle cx="50" cy="30" r="4" fill="#818cf8"/>
    <circle cx="40" cy="45" r="4" fill="#8b5cf6"/>
    <circle cx="30" cy="55" r="4" fill="#7c3aed"/>
    <circle cx="50" cy="55" r="4" fill="#a78bfa"/>
    <circle cx="40" cy="68" r="3" fill="#6366f1" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="195" y="85" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">MCP Engram Memory</text>

  <!-- Tagline -->
  <text x="195" y="120" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8">Persistent cognitive memory for AI agents</text>

  <!-- Feature pills -->
  <g transform="translate(195, 145)">
    <rect x="0" y="0" width="130" height="30" rx="15" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="65" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#a5b4fc">Vector Search</text>

    <rect x="145" y="0" width="155" height="30" rx="15" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="222" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#c4b5fd">Knowledge Graph</text>

    <rect x="315" y="0" width="140" height="30" rx="15" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
    <text x="385" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#c4b5fd">Expert Routing</text>

    <rect x="470" y="0" width="115" height="30" rx="15" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="527" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#a5b4fc">Local-First</text>
  </g>

  <!-- Version + MCP badge -->
  <g transform="translate(195, 190)">
    <rect x="0" y="0" width="60" height="22" rx="4" fill="#334155"/>
    <text x="30" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">v0.5.4</text>
    <rect x="70" y="0" width="85" height="22" rx="4" fill="#334155"/>
    <text x="112" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">49 MCP tools</text>
    <rect x="165" y="0" width="55" height="22" rx="4" fill="#334155"/>
    <text x="192" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">.NET 8</text>
  </g>
</svg>
