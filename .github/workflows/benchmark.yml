name: MSA Benchmarks

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore McpEngramMemory.slnx

      - name: Build
        run: dotnet build McpEngramMemory.slnx --no-restore -c Release

      - name: Run MSA benchmarks
        run: dotnet test tests/McpEngramMemory.Tests/McpEngramMemory.Tests.csproj --no-build -c Release --filter "Category=MSA" --logger "trx;LogFileName=msa-benchmarks.trx" -f net8.0

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: msa-benchmark-results
          path: '**/TestResults/*.trx'
